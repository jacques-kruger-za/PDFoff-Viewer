<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDFoff Viewer</title>
    <style>
      html, body, #root {
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: #171717;
        color: #f5f5f5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background: #171717;
        transition: opacity 600ms ease, transform 600ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      #boot-splash::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at center, rgba(59, 130, 246, 0.18), transparent 58%);
      }

      #boot-splash.is-exiting {
        opacity: 0;
        transform: scale(0.76);
      }

      .boot-splash-content {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
      }

      .boot-splash-logo {
        width: 208px;
        height: 208px;
        filter: drop-shadow(0 24px 80px rgba(59, 130, 246, 0.22));
      }

      .boot-splash-wordmark {
        text-align: center;
      }

      .boot-splash-wordmark h1 {
        margin: 0;
        font-size: 2.25rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .boot-splash-wordmark p {
        margin: 12px 0 0;
        font-size: 0.875rem;
        letter-spacing: 0.42em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.45);
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-hidden="true">
      <div class="boot-splash-content">
        <img class="boot-splash-logo" src="/app-icon.png" alt="" />
        <div class="boot-splash-wordmark">
          <h1>PDFoff Viewer</h1>
          <p>Native PDF Reading</p>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
